name: Zephyr CI

on: [push, pull_request]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kasia0x01/zephyr-ci-arm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build hello_world
        run: |
          cd /workspace/zephyr
          west build -b qemu_cortex_m3 $GITHUB_WORKSPACE/hello_world

      - name: Run on QEMU
        timeout-minutes: 1
        run: |
          cd /workspace/zephyr
          west build -t run 2>&1 | tee /tmp/qemu_output.txt &
          sleep 10
          pkill qemu || true

          if grep -q "Hello World" /tmp/qemu_output.txt; then
            echo "Test passed"
          else
            echo "Test failed"
            cat /tmp/qemu_output.txt
            exit 1
          fi

  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kasia0x01/zephyr-ci-arm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ring_buffer tests on native_sim
        run: |
          cd /workspace/zephyr
          west build -b native_sim $GITHUB_WORKSPACE/tests/ring_buffer
          west build -t run

  # Twister-based equivalent of the unit-tests job above.
  # Twister handles board selection, binary execution, and pass/fail
  # reporting automatically.
  twister-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kasia0x01/zephyr-ci-arm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ring_buffer tests via Twister
        run: |
          /workspace/zephyr/scripts/twister \
            --testsuite-root $GITHUB_WORKSPACE/tests \
            --platform native_sim \
            --inline-logs

      - name: Upload Twister report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-report
          path: twister-out/
