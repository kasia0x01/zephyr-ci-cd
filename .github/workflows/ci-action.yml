name: Zephyr CI (action-zephyr-setup)

on: [push, pull_request]

jobs:

  twister-hello-world:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: arm-zephyr-eabi

      - name: Run Hello World on QEMU via Twister
        run: |
          $ZEPHYR_BASE/scripts/twister \
            -p qemu_cortex_m3 \
            -T ${{ github.workspace }}/hello_world \
            --inline-logs

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-test-results-action
          path: twister-out/

  twister-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: x86_64-zephyr-elf

      - name: Run ring_buffer tests via Twister
        run: |
          $ZEPHYR_BASE/scripts/twister \
            --testsuite-root ${{ github.workspace }}/tests \
            --platform native_sim \
            --inline-logs

      - name: Upload Twister report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-report-action
          path: twister-out/

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: x86_64-zephyr-elf

      - name: Run ring_buffer tests with ASAN/UBSan via Twister
        run: |
          $ZEPHYR_BASE/scripts/twister \
            --testsuite-root ${{ github.workspace }}/tests \
            --platform native_sim \
            --extra-configs CONFIG_ASAN=y CONFIG_UBSAN=y \
            --inline-logs

      - name: Upload sanitizers report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizers-report-action
          path: twister-out/

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: x86_64-zephyr-elf

      - name: Install gcovr
        run: pip install gcovr

      - name: Run ring_buffer tests with coverage via Twister
        run: |
          $ZEPHYR_BASE/scripts/twister \
            --testsuite-root ${{ github.workspace }}/tests \
            --platform native_sim \
            --coverage \
            --coverage-tool gcovr \
            --inline-logs

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-action
          path: twister-out/coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: twister-out/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
