name: Ready actions and Twister

on: [push, pull_request]

jobs:

  twister-hello-world:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: arm-zephyr-eabi

      - name: Run Hello World on QEMU via Twister
        run: |
          west twister \
            -p qemu_cortex_m3 \
            -T ${{ github.workspace }}/hello_world \
            --inline-logs

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-test-results-action
          path: twister-out/

  twister-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: x86_64-zephyr-elf

      - name: Run ring_buffer tests via Twister
        run: |
          west twister \
            --testsuite-root ${{ github.workspace }}/tests \
            --platform native_sim \
            --inline-logs

      - name: Upload Twister report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-report-action
          path: twister-out/

  sanitizers:
    needs: twister-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: x86_64-zephyr-elf

      - name: Run ring_buffer tests with ASAN via Twister
        run: |
          west twister \
            --testsuite-root ${{ github.workspace }}/tests \
            --platform native_sim \
            --enable-asan --enable-lsan --enable-ubsan \
            --inline-logs

      - name: Upload sanitizers report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizers-report-action
          path: twister-out/

  valgrind:
    needs: twister-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: x86_64-zephyr-elf

      - name: Install valgrind
        run: sudo apt-get install -y valgrind

      - name: Install 32-bit debuginfo
        run: |
          dpkg --add-architecture i386
          apt-get update
          apt-get install -y libc6-dbg libc6-dbg:i386

      - name: Run ring_buffer tests with Valgrind via Twister
        run: |
          west twister \
            --testsuite-root ${{ github.workspace }}/tests \
            --platform native_sim \
            --enable-valgrind \
            --inline-logs

      - name: Upload valgrind report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report-action
          path: twister-out/

  coverage:
    needs: twister-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: .
          toolchains: x86_64-zephyr-elf

      - name: Install gcovr
        run: pip install gcovr

      - name: Run ring_buffer tests with coverage via Twister
        run: |
          west twister \
            --testsuite-root ${{ github.workspace }}/tests \
            --platform native_sim \
            --coverage \
            --coverage-tool gcovr \
            --inline-logs

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-action
          path: twister-out/coverage/

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: twister-out/coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
