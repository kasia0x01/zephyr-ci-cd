name: Custom Docker and manual tests workflow

on: [push, pull_request]
env:
  ZEPHYR_DIR: /workspace/zephyr

jobs:

  # WARNING: This implementation is not optimal:
  # 1. Timing: 'sleep 10' causes false failures if the runner is slow
  #    and wastes time if the test finishes early.
  # 2. Dangerous Cleanup: 'pkill' is imprecise and may kill unrelated processes.
  qemu-hello-world:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/kasia0x01/zephyr-ci-arm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build hello_world
        run: |
          cd $ZEPHYR_DIR
          west build -b qemu_cortex_m3 $GITHUB_WORKSPACE/hello_world

      - name: Run on QEMU
        timeout-minutes: 10
        run: |
          cd $ZEPHYR_DIR
          west build -t run 2>&1 | tee /tmp/qemu_output.txt &
          sleep 10
          pkill qemu || true

          if grep -q "Hello World" /tmp/qemu_output.txt; then
            echo "Test passed"
          else
            echo "Test failed"
            cat /tmp/qemu_output.txt
            exit 1
          fi

  # WARNING: This manual test execution is not ideal:
  # 1. False positives: Relies on exit codes that may not catch all issues.
  # 2. No reporting: Lacks structured output (like JUnit XML).
  # Use twister-tests instead.
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/kasia0x01/zephyr-ci-arm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ring_buffer tests on native_sim
        run: |
          cd $ZEPHYR_DIR
          west build -b native_sim $GITHUB_WORKSPACE/tests/ring_buffer
          west build -t run

  valgrind:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/kasia0x01/zephyr-ci-arm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: apt-get install -y valgrind

      - name: Install 32-bit debuginfo
        run: |
          dpkg --add-architecture i386
          apt-get update
          apt-get install -y libc6-dbg libc6-dbg:i386

      - name: Build ring_buffer for native_sim
        run: |
          cd $ZEPHYR_DIR
          west build -b native_sim $GITHUB_WORKSPACE/tests/ring_buffer

      - name: Run tests under Valgrind
        run: valgrind --error-exitcode=1 --leak-check=full $ZEPHYR_DIR/build/zephyr/zephyr.exe

  sanitizers:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/kasia0x01/zephyr-ci-arm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build ring_buffer with ASAN/UBSan
        run: |
          cd $ZEPHYR_DIR
          west build -b native_sim $GITHUB_WORKSPACE/tests/ring_buffer \
            -- -DCONFIG_ZTEST=y -DCONFIG_ASAN=y -DCONFIG_UBSAN=y

      - name: Run tests under sanitizers
        run: |
          cd $ZEPHYR_DIR
          west build -t run

  coverage:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/kasia0x01/zephyr-ci-arm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build ring_buffer with coverage instrumentation
        run: |
          cd $ZEPHYR_DIR
          west build -b native_sim $GITHUB_WORKSPACE/tests/ring_buffer \
            -- -DEXTRA_CONF_FILE=$GITHUB_WORKSPACE/tests/ring_buffer/coverage.conf

      - name: Run tests and collect gcov data
        run: |
          cd $ZEPHYR_DIR
          west build -t run
          echo "exit: $?"

      - name: Generate coverage report
        run: |
          mkdir -p $GITHUB_WORKSPACE/coverage
          gcovr \
            --root $GITHUB_WORKSPACE \
            --filter "$GITHUB_WORKSPACE/lib/ring_buffer/" \
            --html-details $GITHUB_WORKSPACE/coverage/index.html \
            --xml $GITHUB_WORKSPACE/coverage/coverage.xml \
            --print-summary \
            /workspace/zephyr/build/

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-manual
          path: coverage/

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
